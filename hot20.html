<script>
function renderViralTools() {
  const all = getAllTools();
  const hotIds = TOOLS_DATA.hotTools;
  const items = hotIds.map(id => all.find(t => t.id === id)).filter(Boolean);
  
  const grid = document.getElementById('viralGrid');
  grid.innerHTML = items.map((t, i) => `
    <a href="javascript:void(0)" class="tool-card" onclick="showTool(${t.id})" style="${i < 3 ? 'border:2px solid #ff6b6b;' : ''}">

      ${i < 3 ? '<span class="new-tag">🔥 TOP3</span>' : ''}
      <div class="icon">${t.icon}</div>
      <div class="name">${t.name}</div>
      <div class="desc">${t.desc}</div>
    </a>
  `).join('');
}

function showTool(id) {
  const all = getAllTools();
  const tool = all.find(t => t.id === id);
  if (!tool) return;
  
  const modal = document.createElement('div');
  modal.className = 'modal-overlay open';
  modal.onclick = function(e) { if (e.target === this) document.body.removeChild(modal); };
  modal.innerHTML = `
    <div class="modal-content">
      <button class="modal-close" onclick="document.body.removeChild(this.closest('.modal-overlay'))">✕</button>
      <div class="icon-big">${tool.icon}</div>
      <h2>${tool.name} 🔥</h2>
      <p>📂 ${tool.category} · ${tool.desc}</p>
      <ul class="features">
        ${tool.features.map(f => '<li>'+f+'</li>').join('')}
      </ul>
      <button class="btn-primary" onclick="document.body.removeChild(this.closest('.modal-overlay'))">✨ 马上去用！</button>
    </div>
  `;
  document.body.appendChild(modal);
  document.body.style.overflow = 'hidden';
  
  modal.querySelector('.modal-close').addEventListener('click', function() {
    document.body.removeChild(modal);
    document.body.style.overflow = '';
  });
}

document.addEventListener('DOMContentLoaded', renderViralTools);
</script>
